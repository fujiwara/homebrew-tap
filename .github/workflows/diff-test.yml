name: diff-test
on:
  push:
    branches-ignore:
      - master

jobs:
  test:
    name: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_DEVELOPER: "true"
        run: |
          git fetch origin master
          differs=$(git diff origin/master --name-only | grep '\.rb$' || true)
          if [ -z "$differs" ]; then
            echo "No changes found."
            exit 0
          fi
          echo "Changes found in: $differs"
          failed=""
          for file in $differs; do
            echo "Building $file"
            if ! brew install --formula --build-from-source "$file"; then
              echo "::error::Failed to build $file"
              failed="$failed $file"
            fi
          done
          if [ -n "$failed" ]; then
            echo "The following formulae failed to build:$failed"
            exit 1
          fi
