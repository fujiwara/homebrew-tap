name: test
on:
  push:
    branches:
      - master

jobs:
  test:
    name: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_DEVELOPER: "true"
          HOMEBREW_NO_SANDBOX_LINUX: "1"
        run: |
          failed=""
          for file in *.rb; do
            echo "Building $file"
            if ! brew install --formula --build-from-source "$file"; then
              echo "::error::Failed to build $file"
              failed="$failed $file"
            fi
          done
          if [ -n "$failed" ]; then
            echo "The following formulae failed to build:$failed"
            exit 1
          fi
