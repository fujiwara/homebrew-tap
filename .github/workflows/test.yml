name: test
on:
  push:
    branches:
      - master

jobs:
  test:
    name: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_DEVELOPER: "true"
        run: |
          failed=""
          for file in *.rb; do
            echo "Building $file"
            if ! brew install --formula --build-from-source "$file"; then
              echo "::error::Failed to build $file"
              failed="$failed $file"
            fi
          done
          if [ -n "$failed" ]; then
            echo "The following formulae failed to build:$failed"
            exit 1
          fi
